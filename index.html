<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente IA - Seguro</title>
    <style>
        /* Mesmo estilo visual de antes */
        :root { --bg-color: #f4f4f9; --chat-bg: #ffffff; --user-msg: #007bff; --bot-msg: #e9ecef; --text-color: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; display: flex; justify-content: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 600px; height: 90vh; background: var(--chat-bg); margin-top: 5vh; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .chat-header { background-color: var(--user-msg); color: white; padding: 20px; border-radius: 12px 12px 0 0; text-align: center; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; }
        .user-message { background-color: var(--user-msg); color: white; align-self: flex-end; }
        .bot-message { background-color: var(--bot-msg); color: var(--text-color); align-self: flex-start; }
        .input-area { padding: 20px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
        button { padding: 12px 24px; background-color: var(--user-msg); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }
        .loading { display: none; font-size: 0.9rem; color: #666; padding-left: 20px; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h2>Assistente IA (Backend Seguro)</h2>
    </div>
    <div class="chat-box" id="chatBox">
        <div class="message bot-message">Olá! Estou conectado via Node.js. Como posso ajudar?</div>
    </div>
    <div class="loading" id="loadingIndicator">Pensando...</div>
    
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Digite sua mensagem..." onkeypress="handleEnter(event)">
        <button onclick="sendMessage()">Enviar</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const loadingIndicator = document.getElementById('loadingIndicator');

    function addMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender === 'user' ? 'user-message' : 'bot-message');
        msgDiv.textContent = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleEnter(event) { if (event.key === "Enter") sendMessage(); }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        userInput.value = '';
        loadingIndicator.style.display = 'block';

        try {
            // Chamada para o SEU backend, não para a API externa
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });

            const data = await response.json();
            
            addMessage(data.reply, 'bot');

        } catch (error) {
            console.error('Erro:', error);
            addMessage("Erro ao conectar com o servidor.", 'bot');
        } finally {
            loadingIndicator.style.display = 'none';
        }
    }
</script>

</body>
</html>
